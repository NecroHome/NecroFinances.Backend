    environment:
      - ConnectionStrings__DefaultConnection=Server=mariadb_local;Port 3306;Database=NecroFinances;User=admin;Password=thiago123;
      TZ: America/Sao_Paulo

    networks:
      - necro_network

networks:
  necro_network:
    external: true