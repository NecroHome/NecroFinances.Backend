services:
  api:
    build:
      context: .
      dockerfile: Dockerfile

    container_name: necro_api

    restart: unless-stopped

    ports:
      - "6002:8080"

    environment:
      ConnectionStrings__DefaultConnection: "Server=mariadb_local;Port=3306;Database=NecroFinances;User=admin;Password=thiago123;"
      TZ: "America/Sao_Paulo"

    networks:
      - necro_network

    volumes:
      - /home/logs/NecroFinances:/logs

networks:
  necro_network:
    external: true